services:
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: nucleo-validacao-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: "Oracle123"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./database/init:/opt/oracle/scripts/startup
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/Oracle123@//localhost:1521/FREEPDB1 as sysdba", "@healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle-data:
