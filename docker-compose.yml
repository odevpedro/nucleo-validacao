services:
  oracle:
    image: gvenzl/oracle-free:slim-faststart
    container_name: nucleo-validacao-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "Oracle123"
      APP_USER: "APP_VALIDACAO"
      APP_USER_PASSWORD: "app123"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./database/init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/Oracle123@//localhost:1521/FREEPDB1 as sysdba", "@healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle-data:
