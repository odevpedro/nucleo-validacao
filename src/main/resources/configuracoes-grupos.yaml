grupos:
  100:
    nome: "ABERTURA_CONTA_CORRENTE"
    descricao: "Onboarding digital de PF/PJ"
    ativo: true
    parametros_entrada:
      - nome: "cpf_cnpj"
        tipo: STRING
        obrigatorio: true
        descricao: "CPF ou CNPJ do cliente"
        validacao:
          regex: "^\\d{11}$|^\\d{14}$"
      - nome: "canal_origem"
        tipo: STRING
        obrigatorio: true
        descricao: "Canal de origem da solicitação"
      - nome: "biometria_hash"
        tipo: STRING
        obrigatorio: false
        descricao: "Hash da biometria facial"
    consistencias:
      - id: 101
        nome: "validar_documento_receita"
        descricao: "Valida documento na Receita Federal"
        procedure_ref: "PK_ONBOARDING.VALIDAR_DOCUMENTO_RECEITA"
        tipo: LEITURA
        timeout_ms: 5000
        obrigatoria_para_aprovacao: true
        abortar_grupo_em_falha: true
        parametros:
          - origem: "cpf_cnpj"
            destino: "P_CPF_CNPJ"
      - id: 102
        nome: "verificar_listas_restritivas"
        descricao: "Verifica listas restritivas"
        procedure_ref: "PK_ONBOARDING.VERIFICAR_LISTAS_RESTRITIVAS"
        tipo: LEITURA
        timeout_ms: 5000
        obrigatoria_para_aprovacao: true
        abortar_grupo_em_falha: true
        parametros:
          - origem: "cpf_cnpj"
            destino: "P_CPF_CNPJ"
      - id: 103
        nome: "validar_biometria_face"
        descricao: "Valida biometria facial"
        procedure_ref: "PK_ONBOARDING.VALIDAR_BIOMETRIA_FACE"
        tipo: LEITURA
        timeout_ms: 5000
        obrigatoria_para_aprovacao: false
        abortar_grupo_em_falha: false
        parametros:
          - origem: "biometria_hash"
            destino: "P_BIOMETRIA_HASH"
      - id: 104
        nome: "consultar_restricoes_financeiras"
        descricao: "Consulta restricoes financeiras"
        procedure_ref: "PK_ONBOARDING.CONSULTAR_RESTRICOES_FINANCEIRAS"
        tipo: LEITURA
        timeout_ms: 5000
        obrigatoria_para_aprovacao: true
        abortar_grupo_em_falha: false
        parametros:
          - origem: "cpf_cnpj"
            destino: "P_CPF_CNPJ"
      - id: 105
        nome: "criar_conta_core_bancario"
        descricao: "Cria conta no core bancario"
        procedure_ref: "PK_ONBOARDING.CRIAR_CONTA_CORE_BANCARIO"
        tipo: ESCRITA
        timeout_ms: 10000
        obrigatoria_para_aprovacao: true
        abortar_grupo_em_falha: true
        parametros:
          - origem: "cpf_cnpj"
            destino: "P_CPF_CNPJ"
          - origem: "canal_origem"
            destino: "P_CANAL_ORIGEM"

  200:
    nome: "ANALISE_CREDITO_PESSOAL"
    descricao: "Emprestimo pessoal, cheque especial"
    ativo: true
    parametros_entrada:
      - nome: "cod_cli"
