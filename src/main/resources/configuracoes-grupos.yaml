        timeout_ms: 8000
        obrigatoria_para_aprovacao: true
        abortar_grupo_em_falha: false
        parametros:
          - origem: "cod_cli"
            destino: "P_COD_CLI"
      - id: 203
        nome: "validar_renda_comprovada"
        descricao: "Cruzamento de renda declarada e comprovada"
        procedure_ref: "PK_RENDA.VALIDAR_RENDA"
