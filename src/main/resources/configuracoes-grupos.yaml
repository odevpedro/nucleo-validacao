        procedure_ref: "PK_CREDITO.ANALISAR_CAPACIDADE"
        tipo: LEITURA
        timeout_ms: 5000
        obrigatoria_para_aprovacao: true
        abortar_grupo_em_falha: false
        parametros:
          - origem: "cod_cli"
            destino: "P_COD_CLI"
          - origem: "valor_solicitado"
            destino: "P_VALOR_SOLICITADO"
          - origem: "qtd_parcelas"
            destino: "P_QTD_PARCELAS"
      - id: 205
