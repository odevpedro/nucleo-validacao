spring:
  application:
    name: grupo-consistencias

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: APP_CONSISTENCIA
    password: app123
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: GrupoConsistenciaPool

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd
    time-zone: America/Sao_Paulo

server:
  port: 8080

logging:
  level:
    com.empresa.grupoconsistencias: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.transaction: DEBUG

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: APP_CONSISTENCIA
    password: app123

---
spring:
  config:
    activate:
      on-profile: readonly

  datasource:
    username: APP_READONLY
    password: readonly123

---
spring:
  config:
    activate:
      on-profile: readwrite

  datasource:
    username: APP_READWRITE
    password: rw123

---
spring:
  config:
    activate:
      on-profile: restricted

  datasource:
    username: APP_RESTRICTED
    password: restricted123
