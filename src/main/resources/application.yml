spring:
  application:
    name: nucleo-validacao

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: APP_VALIDACAO
    password: app123
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: NucleoValidacaoPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd
    time-zone: America/Sao_Paulo

server:
  port: 8081

logging:
  level:
    com.empresa.nucleovalidacao: DEBUG
    org.springframework.jdbc: DEBUG
    org.springframework.transaction: DEBUG

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: APP_VALIDACAO
    password: app123

---
spring:
  config:
    activate:
      on-profile: readonly

  datasource:
    username: APP_READONLY
    password: readonly123

---
spring:
  config:
    activate:
      on-profile: readwrite

  datasource:
    username: APP_READWRITE
    password: rw123

---
spring:
  config:
    activate:
      on-profile: restricted

  datasource:
    username: APP_RESTRICTED
    password: restricted123
